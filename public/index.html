<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Letter Recognition</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 32px;
      padding: 24px;
    }

    h1 {
      font-size: 1.2rem;
      letter-spacing: 0.15em;
      color: #aaa;
      text-transform: uppercase;
    }

    .mode-grid {
      display: flex;
      gap: 16px;
    }

    .mode-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 180px;
      height: 180px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .mode-btn:hover {
      background: #2a2a2a;
      border-color: #666;
    }

    .mode-btn span.icon {
      font-size: 2.5rem;
    }
  </style>
</head>
<body>

  <h1>Letter Recognition</h1>

  <div class="mode-grid">
    <a class="mode-btn" href="/camera">
      <span class="icon">📷</span>
      Camera
    </a>
    <a class="mode-btn" href="/draw">
      <span class="icon">✏️</span>
      Draw
    </a>
    <a class="mode-btn" href="/doodle">
      <span class="icon">🎨</span>
      Doodle
    </a>
  </div>

</body>
</html>
